# 1. Ollama (Local)
langchain4j.ollama.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3
langchain4j.ollama.chat-model.timeout=60s

# 2. Embeddings (Local)
langchain4j.ollama.embedding-model.base-url=http://localhost:11434
langchain4j.ollama.embedding-model.model-name=mxbai-embed-large
langchain4j.ollama.embedding-model.timeout=60s

# 3. ChromaDB (Local)
# Si lanzas Chroma desde Docker pero el backend desde IntelliJ, usa localhost
chromadb.url=http://localhost:8000
langchain4j.chroma.base-url=http://localhost:8000

# 4. Ajustes de servidor y archivos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.port=8080